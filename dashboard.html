<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TTPhotos Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        background: linear-gradient(
          135deg,
          #000000 0%,
          #1a1a1a 50%,
          #2d2d2d 100%
        );
        min-height: 100vh;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        max-width: 500px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 30px;
        background: linear-gradient(45deg, #ff0050, #ff4081);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .button {
        background: linear-gradient(45deg, #ff0050, #ff4081);
        color: white;
        padding: 16px 32px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-size: 1.2rem;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 8px 20px rgba(255, 0, 80, 0.3);
      }

      .button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(255, 0, 80, 0.4);
      }

      .back-link {
        color: #ff4081;
        text-decoration: none;
        margin-top: 30px;
        display: inline-block;
      }

      .back-link:hover {
        color: #ff6b9d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎵 TTPhotos</h1>
      <p style="margin-bottom: 30px; opacity: 0.8">
        Ready to upload your music carousel!
      </p>

      <button class="button" onclick="uploadNow()">🚀 Upload Now</button>

      <div style="text-align: center; margin-top: 30px">
        <a href="/" class="back-link">← Back to Home</a>
      </div>
    </div>

    <script>
      async function uploadNow() {
        try {
          const response = await fetch('/upload', { method: 'POST' });
          const data = await response.json();

          if (data.success) {
            alert('Upload successful!');
          } else {
            alert('Upload failed: ' + data.error);
          }
        } catch (error) {
          alert('Upload failed: ' + error.message);
        }
      }
    </script>
  </body>
</html>
